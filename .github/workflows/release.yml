name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config cmake protobuf-compiler

      # ── gnu targets: native compilation ──
      - name: Install OpenSSL dev (gnu)
        if: contains(matrix.target, 'gnu')
        run: sudo apt-get install -y libssl-dev

      # ── musl targets: static OpenSSL + musl toolchain ──
      - name: Install musl tools (x86_64-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get install -y musl-tools
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> $GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p cdn-proxy

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cdn-proxy-${{ matrix.target }}.tar.gz cdn-proxy
          cd ../../..
          sha256sum cdn-proxy-${{ matrix.target }}.tar.gz > cdn-proxy-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdn-proxy-${{ matrix.target }}
          path: |
            cdn-proxy-${{ matrix.target }}.tar.gz
            cdn-proxy-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cdn-proxy-*.tar.gz
            artifacts/cdn-proxy-*.tar.gz.sha256
