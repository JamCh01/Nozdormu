---
# Pingora server configuration
version: 1
threads: 4
pid_file: /tmp/nozdormu-cdn.pid
error_log: /tmp/nozdormu-cdn-error.log
upgrade_sock: /tmp/nozdormu-cdn.sock

# CDN configuration
cdn:
  # Listener address
  listen: "0.0.0.0:6188"

  # TLS listener address (optional, requires certs in --cert-path)
  # tls_listen: "0.0.0.0:6189"
  # early_data: false
  # max_early_data: 16384

  # Prometheus metrics endpoint
  metrics_listen: "0.0.0.0:6190"

  # Upstream backends
  upstreams:
    - address: "1.1.1.1:443"
      tls: true
      sni: "one.one.one.one"
    - address: "1.0.0.1:443"
      tls: true
      sni: "one.one.one.one"

  # Health check settings
  health_check:
    interval_secs: 10
    type: tcp

  # Load balancing algorithm: round_robin | ketama
  load_balancing: round_robin

  # Live ingest (RTMP/SRT push streaming → HLS/LL-HLS output)
  # ingest:
  #   enabled: true
  #   rtmp:
  #     enabled: true
  #     listen: "0.0.0.0:1935"
  #   srt:
  #     enabled: true
  #     listen: "0.0.0.0:9000"
  #     latency_ms: 120
  #   segment_duration: 6.0
  #   ll_hls:
  #     enabled: true
  #     part_duration: 0.33
  #   max_segments: 10
  #   max_streams: 100
  #   stream_timeout_secs: 30
  #   stream_keys:
  #     - key: "your_secret_key"
  #       app: "live"
  #       stream_name: "stream1"
  #       enabled: true
